name: Update README

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update README and assets
        env:
          FIRESTORE_SERVICE_ACCOUNT: ${{ secrets.FIRESTORE_SERVICE_ACCOUNT }}
        run: npx ts-node src/update.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/generated/
          git diff --cached --quiet && exit 0
          LAST_AUTHOR=$(git log -1 --format='%ae')
          if [ "$LAST_AUTHOR" = "github-actions[bot]@users.noreply.github.com" ]; then
            # amend instead of new commit
            git commit --amend --no-edit
            git push --force-with-lease
          else
            git commit -m "chore: update readme [skip ci]"
            git push
          fi
